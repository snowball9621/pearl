name: Build Salad PRL image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "salad/**"
      - ".github/workflows/build-salad-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: salad/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pearl-salad:latest
            ghcr.io/${{ github.repository_owner }}/pearl-salad:${{ github.sha }}
